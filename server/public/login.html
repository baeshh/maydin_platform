<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>고객 로그인</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      }

      body {
        align-items: center;
        background: linear-gradient(135deg, #f4f7ff 0%, #e0e7ff 100%);
        color: #191f28;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }

      .login-card {
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.65);
        border-radius: 30px;
        box-shadow: 0 24px 48px rgba(0, 32, 100, 0.08);
        max-width: 420px;
        padding: 38px 24px;
        width: 100%;
      }

      h1 {
        font-size: clamp(24px, 6vw, 28px);
        letter-spacing: -0.6px;
        line-height: 1.35;
        margin-bottom: 10px;
      }

      p {
        color: #4e5968;
        font-size: 15px;
        line-height: 1.5;
        margin-bottom: 28px;
      }

      label {
        color: #4e5968;
        display: block;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 8px;
        padding-left: 4px;
      }

      input {
        background: #fff;
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 16px;
        font-size: 16px;
        height: 56px;
        margin-bottom: 18px;
        outline: none;
        padding: 0 20px;
        width: 100%;
      }

      input:focus {
        border-color: #0064ff;
        box-shadow: 0 0 0 4px rgba(0, 100, 255, 0.1);
      }

      button {
        background: #0064ff;
        border: none;
        border-radius: 18px;
        color: #fff;
        cursor: pointer;
        font-size: 17px;
        font-weight: 800;
        height: 60px;
        width: 100%;
      }

      .links {
        margin-top: 22px;
        text-align: center;
      }

      .links a {
        color: #8b95a1;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
      }

      .message {
        color: #d92d20;
        font-size: 13px;
        margin-top: 16px;
        min-height: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="login-card">
      <h1><span id="pharmacyName">약국</span> 고객 로그인</h1>
      <p>QR코드로 가입한 휴대폰 번호를 입력하면 해당 약국몰로 입장할 수 있습니다.</p>
      <form id="loginForm">
        <label>휴대폰 번호</label>
        <input name="phone" type="tel" placeholder="010-0000-0000" autocomplete="tel" required />
        <button>로그인하기</button>
      </form>
      <p id="message" class="message"></p>
      <div class="links">
        <a id="joinLink" href="#">아직 가입하지 않았다면 QR 가입하기</a>
      </div>
    </main>
    <script src="/app.js"></script>
    <script>
      const params = new URLSearchParams(location.search);
      const pharmacyCode = params.get('pharmacyCode') || 'A001';
      $('#joinLink').href = `/join.html?pharmacyCode=${encodeURIComponent(pharmacyCode)}`;

      async function loadPharmacy() {
        try {
          const data = await api.request(`/pharmacies/by-code/${encodeURIComponent(pharmacyCode)}`);
          document.title = `${data.pharmacy.pharmacy_name} 고객 로그인`;
          $('#pharmacyName').textContent = data.pharmacy.pharmacy_name;
        } catch (error) {
          message(error.message);
        }
      }

      $('#loginForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          const body = serializeForm(event.target);
          body.pharmacyCode = pharmacyCode;
          const data = await api.request('/auth/customer/phone-login', { method: 'POST', body });
          saveSession(data);
          location.href = `/store.html?pharmacyCode=${encodeURIComponent(pharmacyCode)}`;
        } catch (error) {
          message(error.message);
        }
      });

      loadPharmacy();
    </script>
  </body>
</html>
