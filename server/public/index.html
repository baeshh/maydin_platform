<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Maydin 폐쇄몰 MVP</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Maydin 약국 전용 폐쇄몰 SaaS MVP</h1>
      <p>Admin이 약국몰을 만들고, 약국 운영자가 상품/주문을 관리하며, 고객은 QR 링크로 가입해 주문합니다.</p>
    </header>
    <main>
      <section class="grid">
        <article class="card">
          <h2>플랫폼 Admin</h2>
          <p class="muted">초기 계정: admin@maydin.kr / admin1234</p>
          <a href="/admin.html">Admin 화면 열기</a>
        </article>
        <article class="card">
          <h2>약국 운영자</h2>
          <p class="muted">데모 계정: owner@apharmacy.kr / owner1234</p>
          <a href="/owner.html">운영자 화면 열기</a>
        </article>
        <article class="card">
          <h2>고객 쇼핑몰</h2>
          <p class="muted">데모 약국 코드 A001</p>
          <a href="/join.html?pharmacyCode=A001">QR 가입 화면</a><br />
          <a href="/store.html?pharmacyCode=A001">쇼핑몰 화면</a>
        </article>
      </section>
      <section class="card">
        <h2>서버 확인</h2>
        <button id="health">/api/health 확인</button>
        <pre id="message" class="notice"></pre>
      </section>
    </main>
    <script src="/app.js"></script>
    <script>
      $('#health').addEventListener('click', async () => {
        try {
          const data = await api.request('/health');
          message(JSON.stringify(data, null, 2));
        } catch (error) {
          message(error.message);
        }
      });
    </script>
  </body>
</html>
